name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build application
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Validate SAM service source
        run: python -m compileall sam-service/app

      - name: Validate Compose configuration
        run: docker compose config

      - name: Build container image
        run: docker build -t texture-enhancer:ci .
